[package]
name = "party-display"
version = "0.1.0"
edition = "2021"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri              = { version = "2", features = ["devtools"] }
tauri-plugin-deep-link = "2"
tauri-plugin-shell     = "2"
serde      = { version = "1", features = ["derive"] }
serde_json = "1"
keyring    = { version = "3", features = ["windows-native"] }
cpal       = "0.15"
rustfft    = "6"

