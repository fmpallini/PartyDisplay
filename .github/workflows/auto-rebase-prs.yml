name: Auto-rebase PRs

on:
  push:
    branches: [master]

jobs:
  rebase-prs:
    name: Rebase open PRs onto master
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase all branches onto master
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCHES=$(git branch -r \
            | grep -v 'origin/master' \
            | grep -v 'origin/HEAD' \
            | sed 's|origin/||' \
            | tr -d ' ')

          if [ -z "$BRANCHES" ]; then
            echo "No branches found — nothing to do"
            exit 0
          fi

          for BRANCH in $BRANCHES; do
            MERGE_BASE=$(git merge-base "origin/$BRANCH" origin/master 2>/dev/null || true)
            if [ -z "$MERGE_BASE" ]; then
              echo "⏭  $BRANCH — no common history with master, skipped"
              continue
            fi

            echo "── Rebasing $BRANCH onto master ──"
            git checkout -B "$BRANCH" "origin/$BRANCH"
            if git rebase origin/master; then
              git push origin "$BRANCH" --force-with-lease
              echo "✅ $BRANCH rebased"
            else
              git rebase --abort
              echo "⚠️  $BRANCH has conflicts — skipped"
            fi
          done
