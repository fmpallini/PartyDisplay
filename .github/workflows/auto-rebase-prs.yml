name: Auto-rebase PRs

on:
  push:
    branches: [master]

jobs:
  rebase-prs:
    name: Rebase open PRs onto master
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Rebase each open PR targeting master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCHES=$(gh pr list --base master --state open --json headRefName -q '.[].headRefName')

          if [ -z "$BRANCHES" ]; then
            echo "No open PRs targeting master — nothing to do"
            exit 0
          fi

          for BRANCH in $BRANCHES; do
            echo "── Rebasing $BRANCH onto master ──"
            if ! git fetch origin "$BRANCH"; then
              echo "⚠️  Could not fetch $BRANCH — skipped"
              continue
            fi
            git checkout -B "$BRANCH" "origin/$BRANCH"
            if git rebase origin/master; then
              git push origin "$BRANCH" --force-with-lease
              echo "✅ $BRANCH rebased"
            else
              git rebase --abort
              echo "⚠️  $BRANCH has conflicts — skipped"
            fi
          done
