name: Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build and publish draft release
    runs-on: windows-latest
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: app

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Build
        run: npm run tauri build
        working-directory: app

      - name: Assemble zip and checksum
        id: package
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $version = "${{ github.ref_name }}"
          $zipName = "party-display-$version.zip"
          $staging = New-Item -ItemType Directory -Force "staging"
          Copy-Item "app/src-tauri/target/x86_64-pc-windows-msvc/release/party-display.exe" "$staging/"
          Copy-Item "docs/docs for release/README.txt" "$staging/"
          Copy-Item "docs/docs for release/LICENSE.txt" "$staging/"
          Copy-Item "presets" "$staging/presets" -Recurse
          Compress-Archive -Path "$staging/*" -DestinationPath $zipName
          Remove-Item -Recurse -Force $staging
          $hash = (Get-FileHash $zipName -Algorithm SHA256).Hash.ToLower()
          "$hash  $zipName" | Out-File -FilePath "checksums.txt" -Encoding ascii
          echo "ZIP_NAME=$zipName" >> $env:GITHUB_ENV

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: ${{ env.ZIP_NAME }}

      - name: Create draft release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} `
            "${{ env.ZIP_NAME }}" `
            "checksums.txt" `
            --draft `
            --generate-notes `
            --title "${{ github.ref_name }}"
