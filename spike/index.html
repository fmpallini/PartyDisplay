<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SDK Spike</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #111; color: #eee; }
    h2 { color: #1db954; }
    button { background: #1db954; color: #000; border: none; border-radius: 20px; padding: 10px 24px; font-weight: bold; cursor: pointer; font-size: 14px; margin-bottom: 16px; }
    div { margin: 8px 0; }
    label { color: #aaa; }
    span { color: #fff; }
    pre { background: #222; padding: 10px; border-radius: 4px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>
  <h2>Spotify Web Playback SDK Spike</h2>
  <button id="loginBtn">Log in with Spotify</button>
  <div><label>Status: </label><span id="status">Waiting for login...</span></div>
  <div><label>Track: </label><span id="track">—</span></div>
  <div><label>FFT sum (non-zero = audio tapped): </label><span id="fft">—</span></div>
  <pre id="log"></pre>

  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <script>
    const { ipcRenderer } = require('electron');

    const log = (...args) => {
      const pre = document.getElementById('log');
      pre.textContent += args.join(' ') + '\n';
      pre.scrollTop = pre.scrollHeight;
      console.log(...args);
    };

    // ── Environment diagnostics (run immediately on load) ──────────────────
    async function runDiagnostics() {
      log('── Environment diagnostics ──');
      log('User-Agent:', navigator.userAgent);
      log('MediaSource supported:', typeof MediaSource !== 'undefined');
      log('navigator.requestMediaKeySystemAccess:', typeof navigator.requestMediaKeySystemAccess);

      // Test Widevine EME
      if (navigator.requestMediaKeySystemAccess) {
        try {
          await navigator.requestMediaKeySystemAccess('com.widevine.alpha', [{
            initDataTypes: ['cenc'],
            videoCapabilities: [{ contentType: 'video/mp4;codecs="avc1.42E01E"' }],
            audioCapabilities: [{ contentType: 'audio/mp4;codecs="mp4a.40.2"' }],
          }]);
          log('✅ Widevine EME: AVAILABLE');
        } catch (e) {
          log('❌ Widevine EME: NOT AVAILABLE —', e.name, e.message);
        }
      } else {
        log('❌ requestMediaKeySystemAccess not present — EME unsupported in this context');
      }

      // Test MSE codec support
      const codecs = ['audio/mp4;codecs="mp4a.40.2"', 'audio/webm;codecs="opus"', 'audio/ogg;codecs="vorbis"'];
      for (const codec of codecs) {
        log(`  MediaSource.isTypeSupported(${codec}):`, MediaSource?.isTypeSupported?.(codec));
      }

      log('── End diagnostics ──');
    }

    runDiagnostics();

    document.getElementById('loginBtn').addEventListener('click', () => {
      ipcRenderer.invoke('start-login');
      document.getElementById('status').textContent = 'Opening Spotify login...';
    });

    ipcRenderer.on('auth-result', (_, result) => {
      if (result.error) {
        log('auth error:', result.error);
        document.getElementById('status').textContent = '❌ Auth failed: ' + result.error;
        return;
      }
      log('Got access token — initializing Spotify player...');
      initPlayer(result.token);
    });

    function initPlayer(token) {
      window.onSpotifyWebPlaybackSDKReady = () => {
        log('SDK ready');
        startPlayer(token);
      };
      if (window.Spotify) startPlayer(token);
    }

    function startPlayer(token) {
      const player = new Spotify.Player({
        name: 'Party Display Spike',
        getOAuthToken: cb => cb(token),
        volume: 0.5,
      });

      player.addListener('ready', ({ device_id }) => {
        document.getElementById('status').textContent = `✅ Connected — device_id: ${device_id}`;
        log('ready — device_id:', device_id);
        tryTapAudio();
      });

      player.addListener('not_ready', ({ device_id }) => {
        document.getElementById('status').textContent = `⚠️ Not ready: ${device_id}`;
        log('not_ready:', device_id);
      });

      player.addListener('player_state_changed', state => {
        if (!state) return;
        const t = state.track_window.current_track;
        document.getElementById('track').textContent =
          `${t.name} — ${t.artists.map(a => a.name).join(', ')}`;
        log('state_changed:', t.name);
      });

      player.addListener('initialization_error', e => log('init_error:', JSON.stringify(e)));
      player.addListener('authentication_error', e => log('auth_error:', JSON.stringify(e)));
      player.addListener('account_error', e => log('account_error (Premium required):', JSON.stringify(e)));
      player.addListener('playback_error', e => log('playback_error:', JSON.stringify(e)));

      player.connect().then(ok => log('connect result:', ok));
    }

    function tryTapAudio() {
      const audioEls = Array.from(document.querySelectorAll('audio'));
      log('audio elements found:', audioEls.length);

      if (audioEls.length > 0) {
        try {
          const ctx = new AudioContext();
          const src = ctx.createMediaElementSource(audioEls[0]);
          const analyser = ctx.createAnalyser();
          analyser.fftSize = 256;
          src.connect(analyser);
          analyser.connect(ctx.destination);
          log('✅ AudioContext tap succeeded');
          runFFT(analyser);
          return;
        } catch (e) {
          log('AudioContext tap failed:', e.message);
        }
      }

      log('⚠️ No audio element found — play a track first, then FFT tap will be re-attempted');
      document.getElementById('fft').textContent = 'Play a track to test FFT tap';
    }

    function runFFT(analyser) {
      const data = new Uint8Array(analyser.frequencyBinCount);
      const tick = () => {
        analyser.getByteFrequencyData(data);
        const sum = data.reduce((a, b) => a + b, 0);
        document.getElementById('fft').textContent =
          `${sum} ${sum > 0 ? '✅ non-zero — audio is flowing' : '(zero — play a track to test)'}`;
        requestAnimationFrame(tick);
      };
      tick();
    }
  </script>
</body>
</html>
