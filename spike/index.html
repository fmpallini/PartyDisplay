<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>SDK Spike — Browser</title>
  <style>
    body { font-family: monospace; padding: 20px; background: #111; color: #eee; }
    h2 { color: #1db954; }
    button { background: #1db954; color: #000; border: none; border-radius: 20px; padding: 10px 24px; font-weight: bold; cursor: pointer; font-size: 14px; margin-bottom: 16px; }
    div { margin: 8px 0; }
    label { color: #aaa; }
    span { color: #fff; }
    pre { background: #222; padding: 10px; border-radius: 4px; white-space: pre-wrap; max-height: 300px; overflow-y: auto; }
  </style>
</head>
<body>
  <h2>Spotify Web Playback SDK Spike — Browser</h2>

  <div id="tokenForm">
    <p style="color:#aaa;margin:0 0 8px">
      Get a token at
      <a href="https://developer.spotify.com/documentation/web-playback-sdk/tutorials/getting-started" target="_blank" style="color:#1db954">
        developer.spotify.com → Web Playback SDK → Getting Started
      </a>
      (click <strong>Get token</strong>, scope: <code>streaming</code>).
    </p>
    <input id="tokenInput" type="text" placeholder="Paste access token here"
      style="width:100%;box-sizing:border-box;padding:8px;background:#222;color:#eee;border:1px solid #444;border-radius:4px;font-family:monospace;font-size:13px" />
    <button id="startBtn" style="margin-top:8px">Start player</button>
  </div>

  <div><label>Status: </label><span id="status">Paste a token above and click Start.</span></div>
  <div><label>Track: </label><span id="track">—</span></div>
  <div><label>FFT sum: </label><span id="fft">—</span></div>
  <pre id="log"></pre>

  <!--
    Intercept AudioNode.prototype.connect BEFORE the SDK loads.
    When the SDK connects any node to AudioDestinationNode (the speakers),
    we also connect that same node to our AnalyserNode — a passive tap that
    works regardless of whether the SDK uses a media element or Web Audio API.
  -->
  <script>
    window._sdkAnalyser = null;
    const _origConnect = AudioNode.prototype.connect;
    AudioNode.prototype.connect = function (destination, ...args) {
      const result = _origConnect.call(this, destination, ...args);
      if (destination instanceof AudioDestinationNode && !window._sdkAnalyser) {
        const analyser = this.context.createAnalyser();
        analyser.fftSize = 256;
        _origConnect.call(this, analyser);
        window._sdkAnalyser = analyser;
        console.log('Audio graph tapped at destination node');
      }
      return result;
    };
  </script>

  <script src="https://sdk.scdn.co/spotify-player.js"></script>
  <script>
    const $ = id => document.getElementById(id);

    const log = (...args) => {
      const pre = $('log');
      pre.textContent += args.join(' ') + '\n';
      pre.scrollTop = pre.scrollHeight;
      console.log(...args);
    };

    $('startBtn').addEventListener('click', () => {
      const token = $('tokenInput').value.trim();
      if (!token) { alert('Paste a token first.'); return; }
      $('tokenForm').style.display = 'none';
      log('Starting player with pasted token...');
      initPlayer(token);
    });

    // ── Player ────────────────────────────────────────────────────────────────

    function initPlayer(token) {
      window.onSpotifyWebPlaybackSDKReady = () => {
        log('SDK ready');
        startPlayer(token);
      };
      if (window.Spotify) startPlayer(token);
    }

    function startPlayer(token) {
      const player = new Spotify.Player({
        name: 'Party Display Spike (Browser)',
        getOAuthToken: cb => cb(token),
        volume: 0.5,
      });

      let audioTapped = false;

      player.addListener('ready', ({ device_id }) => {
        $('status').textContent = `✅ Connected — device_id: ${device_id}`;
        log('ready — device_id:', device_id);
        log('_sdkAnalyser at ready:', window._sdkAnalyser ? 'YES' : 'NO');
      });

      player.addListener('not_ready', ({ device_id }) => {
        $('status').textContent = `⚠️ Not ready: ${device_id}`;
        log('not_ready:', device_id);
      });

      player.addListener('player_state_changed', state => {
        if (!state) return;
        const t = state.track_window.current_track;
        $('track').textContent = `${t.name} — ${t.artists.map(a => a.name).join(', ')}`;
        log('state_changed:', t.name, state.paused ? '(paused)' : '(playing)',
            '| position:', state.position, '| duration:', state.duration);

        if (!state.paused && !audioTapped) {
          setTimeout(() => {
            log('_sdkAnalyser at tap time:', window._sdkAnalyser ? 'YES' : 'NO');
            audioTapped = tryTapAudio();
          }, 200);
        }
      });

      player.addListener('initialization_error', e => log('init_error:', JSON.stringify(e)));
      player.addListener('authentication_error',  e => log('auth_error:', JSON.stringify(e)));
      player.addListener('account_error',         e => log('account_error:', JSON.stringify(e)));
      player.addListener('playback_error',        e => log('playback_error:', JSON.stringify(e)));

      player.connect().then(ok => log('connect result:', ok));
    }

    // ── FFT tap ───────────────────────────────────────────────────────────────

    function tryTapAudio() {
      if (!window._sdkAnalyser) {
        log('⚠️ Audio graph not tapped yet — SDK has not connected to destination');
        $('fft').textContent = 'Audio graph not tapped yet';
        return false;
      }
      log('✅ AnalyserNode ready — starting FFT');
      runFFT(window._sdkAnalyser);
      return true;
    }

    function runFFT(analyser) {
      const data = new Uint8Array(analyser.frequencyBinCount);
      const tick = () => {
        analyser.getByteFrequencyData(data);
        const sum = data.reduce((a, b) => a + b, 0);
        $('fft').textContent = sum > 0
          ? `${sum} ✅ non-zero — audio tap works!`
          : `${sum} (zero — waiting for audio data)`;
        requestAnimationFrame(tick);
      };
      tick();
    }
  </script>
</body>
</html>
